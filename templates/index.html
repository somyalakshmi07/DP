<!DOCTYPE html>
<html>
<head>
    <title>MySQL Data Charts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .chart-container {
            width: 80%;
            margin: auto;
            margin-bottom: 50px;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Output Weight per Actual Product (Bar Chart)</h2>
    <div class="chart-container">
        <canvas id="barChart"></canvas>
    </div>

    <h2>Order TDC per Actual Product (Pie Chart)</h2>
    <div class="chart-container">
        <canvas id="pieChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        fetch('/get-data')
        .then(response => response.json())
        .then(data => {
            const ctxBar = document.getElementById('barChart').getContext('2d');
            const ctxPie = document.getElementById('pieChart').getContext('2d');

            // Bar chart for O/P Wt per Actual Product
            new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: data.products,
                    datasets: [{
                        label: 'O/P Wt',
                        data: data.output_wt,
                        backgroundColor: 'rgba(75, 192, 192, 0.6)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // Pie chart for Order TDC per Actual Product
            new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: data.products,
                    datasets: [{
                        label: 'Order TDC',
                        data: data.order_tdc,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(75, 192, 192, 0.6)',
                            'rgba(153, 102, 255, 0.6)',
                            'rgba(255, 159, 64, 0.6)'
                        ]
                    }]
                }
            });
        });
    </script>
</body>
</html>
