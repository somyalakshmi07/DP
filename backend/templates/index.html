<!DOCTYPE html>
<html>
<head>
    <title>Order TDC vs O/P Wt Chart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f8f9fa;
        }
        .chart-container {
            width: 80%;
            margin: auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h2>Order TDC vs O/P Wt (Bar Chart)</h2>
    <div class="chart-container">
        <canvas id="barChart"></canvas>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            fetch('/get-data')
                .then(response => response.json())
                .then(data => {
                    if (data.order_tdc.length === 0) {
                        alert("No data available to display.");
                        return;
                    }

                    const ctxBar = document.getElementById('barChart').getContext('2d');

                    new Chart(ctxBar, {
                        type: 'bar',
                        data: {
                            labels: data.order_tdc,
                            datasets: [{
                                label: 'O/P Wt',
                                data: data.output_wt,
                                backgroundColor: 'rgba(75, 192, 192, 0.6)',
                                borderColor: 'rgba(75, 192, 192, 1)',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            },
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'top'
                                },
                                tooltip: {
                                    enabled: true
                                }
                            }
                        }
                    });
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    alert('Error fetching data from backend. Check console.');
                });
        });
    </script>
</body>
</html>
