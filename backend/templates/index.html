<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Dashboard</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        /* CSS for the table with fixed header and other UI elements */
        .excel-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .excel-table th,
        .excel-table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .excel-table thead {
            position: sticky;
            top: 0;
            background-color: #f4f4f4;
            z-index: 1;
        }

        .excel-table th {
            background-color: #f4f4f4;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .selection-menu {
            margin: 20px;
        }

        .selection-menu label {
            margin-right: 10px;
        }

        .selection-menu input, .selection-menu select {
            margin-bottom: 10px;
        }

        #scrollToTopBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 50%;
            padding: 10px 15px;
            font-size: 18px;
            cursor: pointer;
            display: none;
        }

        #scrollToTopBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="/home">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
        <a href="/settings">Settings</a>
    </div>

    <nav>
        <span class="hamburger" onclick="openNav()">&#9776;</span>
        <h1>PRODUCTION</h1>
        <div class="nav-buttons">
            <button onclick="uploadData()">Upload</button>
            <button onclick="downloadData()">Download</button>
        </div>
    </nav>
    

    <div class="selection-menu">
        
        <label for="fromDate">From:</label>
        <input type="date" id="fromDate" name="fromDate" />

        <label for="toDate">To:</label>
        <input type="date" id="toDate" name="toDate" />

        <label for="month">Month:</label>
        <select id="month" name="month">
            <option value="">Select Month</option>
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <label for="orderTdc">Order TDC:</label>
        <input type="text" id="orderTdc" name="orderTdc" placeholder="Order TDC" />

        <label for="financialYear">FY:</label>
        <select id="financialYear" name="financialYear">
            <option value="">Select FY</option>
            <option value="22">FY22</option>
            <option value="23">FY23</option>
            <option value="24">FY24</option>
            <option value="25">FY25</option>
        </select>

        <label for="shift">Shift:</label>
        <select id="shift" name="shift">
            <option value="">Select Shift</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
        </select>

        <label for="unit">Unit:</label>
        <select id="unit" name="unit">
            <option value="cgl2">CGL2</option>
            <option value="cgl3">CGL3</option>
        </select>

        <button type="button" onclick="searchData()">Search</button>
    </div>

    <div id="results">
        <!-- Large table or result content here -->
        <div class="result-card">
            <table class="excel-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Status</th>
                        <th>Date</th>
                        <!-- Add more columns if needed to see horizontal scroll -->
                    </tr>
                </thead>
                <tbody>
                    <!-- Sample rows -->
                    <tr>
                        <td>123</td><td>Widget A</td><td>50</td><td>Complete</td><td>2025-05-01</td>
                    </tr>
                    <tr>
                        <td>124</td><td>Widget B</td><td>30</td><td>In Progress</td><td>2025-05-02</td>
                    </tr>
                    <!-- Add more rows for vertical scrolling -->
                </tbody>
            </table>
        </div>
    </div>

    <button id="scrollToTopBtn" title="Go to top">↑</button>

    <script src="../static/app.js"></script>
</body>
</html>
