<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Dashboard</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

    <!-- Sidebar -->
    <div id="mySidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="/home">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/reports">Reports</a>
        <a href="/settings">Settings</a>
    </div>

    <nav>
        <span class="hamburger" onclick="openNav()">&#9776;</span>
        <h1>PRODUCTION</h1>
        <div class="nav-buttons">
            <button onclick="uploadData()">Upload</button>
            <button onclick="downloadData()">Download</button>
        </div>
    </nav>
    

    <div class="selection-menu">
        <label for="unit">Unit:</label>
        <select id="unit" name="unit">
            <option value="">Select Unit</option>
            <option value="CGL-2">CGL-2</option>
            <option value="CGL-3">CGL-3</option>
        </select>

        <label for="fromDate">From:</label>
        <input type="date" id="fromDate" name="fromDate" />

        <label for="toDate">To:</label>
        <input type="date" id="toDate" name="toDate" />

        <label for="month">Month:</label>
        <select id="month" name="month">
            <option value="">Select Month</option>
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <label for="orderTdc">Order TDC:</label>
        <input type="text" id="orderTdc" name="orderTdc" placeholder="Order TDC" />

        <label for="financialYear">FY:</label>
        <select id="financialYear" name="financialYear">
            <option value="">Select FY</option>
            <option value="22">FY22</option>
            <option value="23">FY23</option>
            <option value="24">FY24</option>
            <option value="25">FY25</option>
        </select>

        <label for="shift">Shift:</label>
        <select id="shift" name="shift">
            <option value="">Select Shift</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
        </select>

        <button type="button" onclick="searchData()">Search</button>
    </div>

    <div id="results" style="padding: 20px;">
        <!-- Results will go here -->
    </div>

    <script src="../static/app.js"></script>
</body>
</html>
